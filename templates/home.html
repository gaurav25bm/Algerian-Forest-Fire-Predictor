<!DOCTYPE html>
<html>
<head>
    <title>Algerian Forest Fire Predictor</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        h1 { color: #333; margin-bottom: 20px; }
        input { width: 90%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 95%; padding: 12px; background-color: #ff4b2b; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 15px; }
        button:hover { background-color: #ff416c; }
        h2 { margin-top: 20px; color: #2c3e50; }
    </style>
</head>
<body>
    <div class="login">
        <h1>Forest Fire Predictor</h1>
        
        <form action="{{ url_for('predict_datapoint') }}" method="post">
            <input type="text" name="Temperature" placeholder="Temperature" required="required" />
            <input type="text" name="RH" placeholder="Relative Humidity (RH)" required="required" />
            <input type="text" name="Ws" placeholder="Wind Speed (Ws)" required="required" />
            <input type="text" name="Rain" placeholder="Rain" required="required" />
            <input type="text" name="FFMC" placeholder="FFMC Index" required="required" />
            <input type="text" name="DMC" placeholder="DMC Index" required="required" />
            <input type="text" name="ISI" placeholder="ISI Index" required="required" />
            <input type="text" name="Classes" placeholder="Classes (0 or 1)" required="required" />
            <input type="text" name="Region" placeholder="Region (0 or 1)" required="required" />

            <button type="submit">Predict Fire Weather Index</button>
        </form>

        {% if results %}
        <h2>THE FWI prediction is: {{results}}</h2>
        {% endif %}
    </div>
</body>
</html>
