<!DOCTYPE html>
<html>
<head>
    <title>Algerian Forest Fire Predictor</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            /* Added Forest Background */
            background-image: url('https://images.unsplash.com/photo-1448375240586-882707db888b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .login { 
            background: rgba(255, 255, 255, 0.9); /* Slightly transparent white */
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            width: 400px; 
            text-align: center; 
        }
        h1 { color: #333; margin-bottom: 20px; }
        /* Step 2: Input styling for numbers */
        input { width: 90%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; }
        button.predict { width: 95%; padding: 12px; background-color: #ff4b2b; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 15px; }
        button.predict:hover { background-color: #ff416c; }
        button.reset { width: 95%; padding: 8px; background-color: #6c757d; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        h2 { margin-top: 20px; color: #2c3e50; }
    </style>
</head>
<body>
    <div class="login">
        <h1>Forest Fire Predictor</h1>
        
        <form action="{{ url_for('predict_datapoint') }}" method="post">
            <input type="number" step="0.01" name="Temperature" placeholder="Temperature" required />
            <input type="number" step="0.01" name="RH" placeholder="Relative Humidity (RH)" required />
            <input type="number" step="0.01" name="Ws" placeholder="Wind Speed (Ws)" required />
            <input type="number" step="0.01" name="Rain" placeholder="Rain" required />
            <input type="number" step="0.01" name="FFMC" placeholder="FFMC Index" required />
            <input type="number" step="0.01" name="DMC" placeholder="DMC Index" required />
            <input type="number" step="0.01" name="ISI" placeholder="ISI Index" required />
            <input type="number" step="1" name="Classes" placeholder="Classes (0 or 1)" required />
            <input type="number" step="1" name="Region" placeholder="Region (0 or 1)" required />

            <button type="submit" class="predict">Predict Fire Weather Index</button>
            <button type="reset" class="reset">Clear Inputs</button>
        </form>

        {% if results %}
        <h2>THE FWI prediction is: {{results}}</h2>
        {% endif %}
    </div>
</body>
</html>
